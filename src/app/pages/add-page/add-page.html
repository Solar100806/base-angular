<div class="p-6">
  <h1 class="text-2xl font-semibold mb-6">Thêm mới</h1>

  <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-6">
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> Title </label>
      <input type="text" id="title"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName='title' required="title" />
    </div>

    <div>
      <label htmlFor="text" class="block font-medium mb-1"> slots </label>
      <input type="number" min="0" id="slots"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName='slots' required="slots" />
    </div>

    <div>
      <label htmlFor="text" class="block font-medium mb-1"> description </label>
      <input type="text" id="description"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName='description' required="description" />
    </div>
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> category </label>
      <select formControlName='category' required="category">
        <option value="">Mời chọn công việc</option>
        <option value="IT">IT</option>
        <option value="Marketing">Marketing</option>
        <option value="Sale">Sale</option>
      </select>
    </div>


    <button type="submit" class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
      Submit
    </button>
  </form>
</div>
