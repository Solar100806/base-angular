<div class="p-6">
  <h1 class="text-2xl font-semibold mb-6">Đăng ký</h1>

  <form [formGroup]="form" (ngSubmit)="handleSubmit()" class="space-y-6">
    <div>
      <label htmlFor="text" class="block font-medium mb-1"> username </label>
      <input
        type="text"
         required="username"
        id="username"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName = 'username'
      />
    </div>

    <div>
      <label htmlFor="text" class="block font-medium mb-1"> email </label>
      <input
        type="email"
        required="email"
        id="email"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName = 'email'
      />
    </div>

     <div>
      <label htmlFor="text" class="block font-medium mb-1"> password </label>
      <input
        type="password"
        required="password"
        minlength="6"
        id="password"
        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        formControlName = 'password'
      />
    </div>
    <button
      type="submit"
      class="px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
    >
      Submit
    </button>
  </form>
</div>
